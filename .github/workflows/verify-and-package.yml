name: Verify and package Offshift

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker:
    name: Worker contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npm ci
        working-directory: offshift_worker
      - run: npm run build:widget
        working-directory: offshift_worker
      - run: npm run typecheck
        working-directory: offshift_worker
      - run: npm test
        working-directory: offshift_worker

  macos:
    name: macOS companion and DMG
    runs-on: macos-14
    defaults:
      run:
        working-directory: offshift_companion
    steps:
      - uses: actions/checkout@v4
      - run: swift test
      - run: ./script/package_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Offshift-dmg-${{ github.sha }}
          path: offshift_companion/release/Offshift-*.dmg
          if-no-files-found: error
          retention-days: 30
