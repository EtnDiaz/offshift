name: Verify and package Offshift

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker:
    name: Worker contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npm ci
        working-directory: offshift_worker
      - run: npm run build:widget
        working-directory: offshift_worker
      - run: npm run typecheck
        working-directory: offshift_worker
      - run: npm test
        working-directory: offshift_worker

  macos:
    name: macOS companion and DMG
    runs-on: macos-15
    defaults:
      run:
        working-directory: offshift_companion
    steps:
      - uses: actions/checkout@v4
      - run: swift test
      - run: ./script/package_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Offshift-dmg-${{ github.sha }}
          path: offshift_companion/release/Offshift-*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [worker, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # `gh release create` resolves repository metadata from this checkout.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Offshift-dmg-${{ github.sha }}
          path: release
      - name: Publish DMG and checksum
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          sha256sum release/*.dmg > release/SHA256SUMS.txt
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/*.dmg release/SHA256SUMS.txt --clobber
          else
            printf '%s\n' \
              '## Install Offshift' \
              '' \
              '1. Download the DMG below.' \
              '2. Open it and drag **Offshift** to **Applications**.' \
              '3. Open Offshift from Applications. Its first run opens a short setup window; afterwards it lives in the menu bar.' \
              '' \
              'This is an Apple-silicon developer preview for macOS 14 or later. It is ad-hoc signed for testing, not Developer ID notarized; macOS may require an explicit local approval before first launch. See the README for the reproducible source-build path and privacy boundary.' \
              > release/RELEASE_NOTES.md
            gh release create "$TAG" release/*.dmg release/SHA256SUMS.txt \
              --title "Offshift $TAG" \
              --notes-file release/RELEASE_NOTES.md
          fi
